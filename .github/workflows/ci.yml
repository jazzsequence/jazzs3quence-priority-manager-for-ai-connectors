name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPCS
        run: composer lint

  wordpress-plugin-checks:
    name: WordPress.org Plugin Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Inlined from wordpress/plugin-check-action rather than using the action directly.
      # Node 24.16.0 (ubuntu-latest since 2026-05-25) triggers a silent wp-env bug when
      # .wp-env.json contains URL-based plugin entries (WordPress/plugin-check-action#579).
      # Fix: install plugin-check via wp-cli post-boot instead of via .wp-env.json.
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set plugin environment variables
        run: |
          PLUGIN_DIR=$(realpath "./")
          PLUGIN_SLUG=$(basename "$PLUGIN_DIR")
          echo "PLUGIN_DIR=$PLUGIN_DIR" >> "$GITHUB_ENV"
          echo "PLUGIN_SLUG=$PLUGIN_SLUG" >> "$GITHUB_ENV"

      - name: Install wp-env and configure
        run: |
          npm -g --no-fund install @wordpress/env
          echo '{"core":null,"plugins":[],"mappings":{"wp-content/plugins/'"$PLUGIN_SLUG"'":"'"$PLUGIN_DIR"'"}}' > .wp-env.json

      - name: Start wp-env
        run: wp-env start

      - name: Install and activate plugin-check
        run: wp-env run cli wp plugin install plugin-check --activate

      - name: Run plugin checks
        run: |
          wp-env run cli wp plugin activate "$PLUGIN_SLUG"
          wp-env run cli wp plugin check "$PLUGIN_SLUG" \
            --format=json \
            --exclude-directories=vendor,tests,bin \
            --require=./wp-content/plugins/plugin-check/cli.php
  
  unit-tests:
    name: Unit tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run unit tests
        run: composer test:phpunit

  integration-tests:
    name: Integration tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none
          extensions: mysqli

      - name: Setup WP-CLI
        uses: godaddy-wordpress/setup-wp-cli@1

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Make bin scripts executable
        run: chmod +x bin/*.sh

      - name: Install WordPress test suite
        run: composer test:install

      - name: Run integration tests
        run: composer test:integration
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
