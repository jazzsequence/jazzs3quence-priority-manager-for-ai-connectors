name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.github/workflows/**'
      - '.wordpress-org/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.github/workflows/**'
      - '.wordpress-org/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPCS
        run: composer lint

  wordpress-plugin-checks:
    name: WordPress.org Plugin Checks
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli
          coverage: none

      - name: Install WP-CLI
        uses: godaddy-wordpress/setup-wp-cli@1

      - name: Download WordPress
        run: wp core download --version=latest --path=/tmp/wordpress

      - name: Configure WordPress
        run: |
          wp config create \
            --path=/tmp/wordpress \
            --dbname=wordpress_test \
            --dbuser=root \
            --dbpass= \
            --dbhost=127.0.0.1

      - name: Install WordPress
        run: |
          wp core install \
            --path=/tmp/wordpress \
            --url=localhost \
            --title=Test \
            --admin_user=admin \
            --admin_password=admin \
            --admin_email=test@example.com \
            --skip-email

      - name: Setup Plugins
        run: wp plugin install ai plugin-check --activate --path=/tmp/wordpress

      - name: Copy this plugin
        run: |
          rsync -a \
            --exclude='.git' \
            --exclude='vendor' \
            --exclude='tests' \
            --exclude='bin' \
            . /tmp/wordpress/wp-content/plugins/jazzs3quence-priority-manager-for-ai-connectors/

      - name: WordPress.org Plugin Check
        run: |
          RESULTS=$(wp plugin check jazzs3quence-priority-manager-for-ai-connectors \
            --path=/tmp/wordpress \
            --exclude-directories=vendor,tests,bin,.github \
            --exclude-files=.gitignore,.distignore,CLAUDE.md \
            --format=json 2>/dev/null)

          # No findings: wp plugin check outputs a plain success message, not JSON.
          if echo "$RESULTS" | grep -q "^Success:"; then
            echo "Plugin check passed."
            exit 0
          fi

          # Output format is "FILE: path\n[{json}]" per file — parse line by line.
          HAS_ISSUES=0
          CURRENT_FILE=""
          while IFS= read -r line; do
            if [[ "$line" == FILE:* ]]; then
              CURRENT_FILE="${line#FILE: }"
            elif [[ "$line" == \[* ]]; then
              ISSUES=$(echo "$line" | jq -r '
                .[] | select(.type == "ERROR" or .type == "WARNING") |
                "  [\(.type)] line \(.line): \(.code)\n    \(.message | gsub("&quot;"; "\""))"
              ' 2>/dev/null)
              if [ -n "$ISSUES" ]; then
                echo ""
                echo "FILE: $CURRENT_FILE"
                echo "$ISSUES"
                HAS_ISSUES=1
              fi
            fi
          done <<< "$RESULTS"

          if [ "$HAS_ISSUES" -eq 1 ]; then
            echo ""
            echo "Plugin check failed."
            exit 1
          fi
          echo "Plugin check passed."

  unit-tests:
    name: Unit tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run unit tests
        run: composer test:phpunit

  validate-plugin-version:
    name: Validate Tested Up To Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate plugin tested up to version
        uses: jazzsequence/action-validate-plugin-version@v2.0.1
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}

  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Scan for vulnerabilities
        uses: jazzsequence/action-wordpress-vulnerability-scanner@1.0.1
        with:
          type: plugin
          name: jazzs3quence-priority-manager-for-ai-connectors

  integration-tests:
    name: Integration tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none
          extensions: mysqli

      - name: Setup WP-CLI
        uses: godaddy-wordpress/setup-wp-cli@1

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Make bin scripts executable
        run: chmod +x bin/*.sh

      - name: Install WordPress test suite
        run: composer test:install

      - name: Run integration tests
        run: composer test:integration
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
